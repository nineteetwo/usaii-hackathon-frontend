<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Create a CalHelpr account — Save your conversations and personalize your experience.">
    <title>Sign Up — CalHelpr</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Allerta+Stencil&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>

<body class="auth-body">
    <div class="auth-wrapper">
        <!-- Back link -->
        <a href="index.html" class="auth-back-link" id="signup-back">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Back to Chat</span>
        </a>

        <div class="auth-card">
            <!-- Logo / Brand -->
            <div class="auth-brand">
                <a href="index.html" class="auth-logo-row">
                    <span class="brand-text brand-text-lg">CalHelpr</span>
                    <i class="bi bi-plus-lg brand-cross brand-cross-lg"></i>
                </a>
                <h1 class="auth-title">Create Your Account</h1>
                <p class="auth-subtitle">Join CalHelpr to save conversations and more</p>
            </div>

            <!-- Signup Form -->
            <form id="signup-form" class="auth-form" action="#" method="post">
                <div class="form-group">
                    <label for="signup-name" class="form-label">Full Name</label>
                    <div class="form-input-wrap">
                        <i class="fa-regular fa-user form-icon"></i>
                        <input type="text" id="signup-name" class="form-input" placeholder="John Doe" required
                            autocomplete="name">
                    </div>
                </div>

                <div class="form-group">
                    <label for="signup-email" class="form-label">Email Address</label>
                    <div class="form-input-wrap">
                        <i class="fa-regular fa-envelope form-icon"></i>
                        <input type="email" id="signup-email" class="form-input" placeholder="you@example.com" required
                            autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label for="signup-password" class="form-label">Password</label>
                    <div class="form-input-wrap">
                        <i class="fa-solid fa-lock form-icon"></i>
                        <input type="password" id="signup-password" class="form-input"
                            placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
                        <button type="button" id="toggle-signup-password" class="form-toggle-pw"
                            aria-label="Toggle password visibility">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signup-confirm" class="form-label">Confirm Password</label>
                    <div class="form-input-wrap">
                        <i class="fa-solid fa-lock form-icon"></i>
                        <input type="password" id="signup-confirm" class="form-input"
                            placeholder="Re-enter your password" required minlength="8" autocomplete="new-password">
                    </div>
                </div>

                <div class="form-options">
                    <label class="form-checkbox-label">
                        <input type="checkbox" id="agree-terms" class="form-checkbox" required>
                        <span class="form-checkbox-custom"></span>
                        <span>I agree to the <a href="#" class="form-link">Terms of Service</a></span>
                    </label>
                </div>

                <button type="submit" id="signup-submit" class="auth-submit-btn">
                    Create Account
                </button>
            </form>

            <!-- Login nudge -->
            <p class="auth-switch-text">
                Already have an account? <a href="login.html" class="form-link" id="login-link">Sign in</a>
            </p>
        </div>

        <!-- Footer -->
        <p class="auth-footer-text">
            &copy; 2026 CalHelpr. All rights reserved.
        </p>
    </div>

    <script src="auth.js"></script>
</body>

</html>
